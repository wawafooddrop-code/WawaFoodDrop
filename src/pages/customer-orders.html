body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; position: relative; overflow-x: hidden; }

.status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 9999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
</style>
<script>
firebase.initializeApp({
  apiKey: 'AIzaSyCJ3ybFxxzDkQgMQst6WhhqSZ5K6gyJpuM',
  authDomain: 'wawa-food-drop-c38ee.firebaseapp.com',
  projectId: 'wawa-food-drop-c38ee'
});
const db = firebase.firestore();

const ACTIVE_STATUSES = ['pending_approval', 'placed', 'accepted', 'preparing', 'ready_for_pickup', 'assigned', 'picked_up', 'out_for_delivery'];
const PAST_STATUSES   = ['delivered', 'cancelled'];

const STATUS_CONFIG = {
  pending_approval:  { label: 'Awaiting Approval', color: 'bg-orange-100 text-orange-700', dot: 'bg-orange-500 animate-pulse' },
  placed:          { label: 'Placed',          color: 'bg-violet-100 text-violet-700', dot: 'bg-violet-500' },
  accepted:        { label: 'Accepted',       color: 'bg-blue-100 text-blue-700',    dot: 'bg-blue-500' },
  preparing:       { label: 'Preparing',       color: 'bg-amber-100 text-amber-700',   dot: 'bg-amber-500' },
  ready_for_pickup:{ label: 'Ready for Pickup',color: 'bg-orange-100 text-orange-700',dot: 'bg-orange-500' },
  assigned:        { label: 'Assigned',        color: 'bg-cyan-100 text-cyan-700',    dot: 'bg-cyan-500' },
  picked_up:      { label: 'Picked Up',       color: 'bg-teal-100 text-teal-700',    dot: 'bg-teal-500' },
  out_for_delivery:{ label: 'Out for Delivery',color: 'bg-indigo-100 text-indigo-700',dot: 'bg-indigo-500' },
  delivered:       { label: 'Delivered',       color: 'bg-green-100 text-green-700',   dot: 'bg-green-500' },
  cancelled:       { label: 'Cancelled',       color: 'bg-red-100 text-red-700',       dot: 'bg-red-500' }
};

function statusConfig(status) {
  return STATUS_CONFIG[status] || { label: status || 'Unknown', color: 'bg-stone-100 text-stone-600', dot: 'bg-stone-400' };
}

function formatDate(timestamp) {
  if (!timestamp) return '';
  const d = timestamp.seconds ? new Date(timestamp.seconds * 1000) : new Date(timestamp);
  return d.toLocaleDateString('en-PH', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}

function makeOrderCard(doc) {
  const o = doc.data();
  const sc = statusConfig(o.status);
  const total = o.total ? '?' + Number(o.total).toLocaleString('en-PH', { minimumFractionDigits: 2 }) : '�';
  const date  = formatDate(o.createdAt);
  const items = o.items || [];
  const itemCount = items.length;
  const firstItem = items[0] || {};
  const restName = o.restaurantName || firstItem.restaurantName || 'Restaurant';
  const restImage = firstItem.image || 'assets/logo.png';

  // Status step indicator
  const statusIdx = ACTIVE_STATUSES.indexOf(o.status);
  let stepHtml = '';
  if (statusIdx >= 0 && o.status !== 'delivered' && o.status !== 'cancelled') {
    const steps = ['Placed','Accepted','Preparing','Ready','Assigned','Picked Up','Out'];
    const activeStep = steps[statusIdx] || steps[0];
    stepHtml = `<div class="flex items-center gap-1.5 mt-1">
      <span class="w-2 h-2 rounded-full ${sc.dot} animate-pulse"></span>
      <span class="text-xs font-semibold ${sc.color.replace('bg-', 'text-')}">${activeStep}</span>
    </div>`;
  }

  return `<div class="bg-surface-container-lowest rounded-xl p-4 flex gap-4 items-center shadow-sm hover:shadow-md transition-shadow cursor-pointer border border-surface-container" onclick="window.location.href='order-success.html?id=${doc.id}'">
    <div class="w-14 h-14 rounded-xl overflow-hidden flex-shrink-0 bg-surface-container">
      <img src="${restImage}" alt="${restName}" class="w-full h-full object-cover" onerror="this.style.display='none'"/>
    </div>
    <div class="flex-1 min-w-0">
      <div class="flex justify-between items-start gap-2">
        <div>
          <h4 class="font-bold text-on-surface text-sm truncate">${restName}</h4>
          <p class="text-xs text-on-surface-variant">${date}</p>
          ${stepHtml}
        </div>
        <div class="flex flex-col items-end gap-1 flex-shrink-0">
          <span class="font-extrabold text-on-surface text-sm">${total}</span>
          <span class="status-badge ${sc.color}">${sc.label}</span>
        </div>
      </div>
      <p class="text-xs text-on-surface-variant mt-1 truncate">${itemCount} item${itemCount !== 1 ? 's' : ''} ${o.customerName ? '� ' + o.customerName : ''}</p>
    </div>
  </div>`;
}

function makeEmptyState(icon, title, subtitle) {
  return `<div class="flex flex-col items-center justify-center py-12 text-center">
    <span class="material-symbols-outlined text-[48px] text-outline-variant mb-3" style="font-variation-settings:'FILL'0">${icon}</span>
    <h3 class="font-bold text-on-surface text-base">${title}</h3>
    <p class="text-sm text-on-surface-variant mt-1">${subtitle}</p>
  </div>`;
}

let unsubscribe = null;

async function loadOrders() {
  const user = JSON.parse(localStorage.getItem('wawa_user') || 'null');
  const activeContainer = document.getElementById('activeOrders');
  const pastContainer   = document.getElementById('pastOrders');
  const activeCount     = document.getElementById('activeCount');
  const pastCount       = document.getElementById('pastCount');

  if (!activeContainer || !pastContainer) return;

  if (!user) {
    activeContainer.innerHTML = makeEmptyState('receipt_long', 'Sign in to see your orders', 'Browse restaurants and place orders to track them here.');
    pastContainer.innerHTML   = '';
    if (activeCount) activeCount.textContent = '0';
    if (pastCount)   pastCount.textContent   = '0';
    return;
  }

  try {
    let ref;
    if (user.id) {
      ref = db.collection('orders').where('customerId', '==', user.id).orderBy('createdAt', 'desc').limit(50);
    } else if (user.name) {
      ref = db.collection('orders').where('customerName', '==', user.name).orderBy('createdAt', 'desc').limit(50);
    } else {
      activeContainer.innerHTML = makeEmptyState('receipt_long', 'Sign in to see your orders', 'Browse restaurants and place orders to track them here.');
      pastContainer.innerHTML   = '';
      if (activeCount) activeCount.textContent = '0';
      if (pastCount)   pastCount.textContent   = '0';
      return;
    }

    if (unsubscribe) unsubscribe();
    unsubscribe = ref.onSnapshot(snap => {
      let activeHtml = '', pastHtml = '';
      let activeTotal = 0, pastTotal = 0;

      snap.forEach(doc => {
        const o = doc.data();
        if (user.id && o.customerId !== user.id && o.customerName !== user.name) return;
        if (!user.id && o.customerName !== user.name) return;

        if (ACTIVE_STATUSES.includes(o.status)) {
          activeHtml += makeOrderCard(doc);
          activeTotal++;
        } else {
          pastHtml += makeOrderCard(doc);
          pastTotal++;
        }
      });

      activeContainer.innerHTML = activeHtml || makeEmptyState('restaurant', 'No active orders', 'Your in-progress orders will appear here.');
      pastContainer.innerHTML    = pastHtml   || makeEmptyState('history', 'No past orders', 'Your completed orders will appear here.');
      if (activeCount) activeCount.textContent = activeTotal;
      if (pastCount)   pastCount.textContent   = pastTotal;
    }, e => {
      console.error('loadOrders error:', e);
      activeContainer.innerHTML = makeEmptyState('error', 'Failed to load orders', 'Check your connection and try again.');
      pastContainer.innerHTML   = '';
    });
  } catch(e) {
    console.error('loadOrders error:', e);
    activeContainer.innerHTML = makeEmptyState('error', 'Failed to load orders', 'Check your connection and try again.');
    pastContainer.innerHTML   = '';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  loadOrders();
  updateCartBadge();
});
</script>

};
</script>

<script>
function requireAuth(e) {
  const user = JSON.parse(localStorage.getItem('wawa_user') || 'null');
  if (!user) {
    e.preventDefault();
    const btn = e.currentTarget;
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined text-lg animate-spin">hourglass</span><span class="text-[8px] font-semibold uppercase tracking-wider mt-0.5">Loading</span>';
    setTimeout(() => { window.location.href = 'sign-in.html'; }, 300);
    return false;
  }
  return true;
}

function updateCartBadge() {
  const cart = JSON.parse(localStorage.getItem('wawa_cart') || '[]');
  const total = cart.reduce((sum, item) => sum + item.quantity, 0);
  const badge = document.getElementById('cartBadge');
  if (badge) badge.textContent = total;
  if (badge) badge.style.display = total > 0 ? 'flex' : 'none';
}

function initNav() {
  const tabs = document.querySelectorAll('.nav-tab');
  if (!tabs.length) return;
  tabs.forEach(tab => {
    tab.addEventListener('click', (e) => {
      const href = tab.getAttribute('href');
      if (!href || href === '#') return;
      if (tab.classList.contains('auth-required')) {
        if (!requireAuth(e)) return;
      }
      e.preventDefault();
      const main = document.querySelector('main');
      if (main) main.style.opacity = '0';
      setTimeout(() => { window.location.href = href; }, 250);
    });
  });
}
updateCartBadge();
initNav();
</script>
