<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Merchant Sign In - Wawa Food Drop</title>
<link rel="icon" type="image/png" href="assets/logo.png"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script src="scripts/firebase.js"></script>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        secondary: "#ab3500",
        primary: "#006d36",
        background: "#f9f9fc",
        "on-primary": "#ffffff",
        "on-secondary": "#ffffff",
        "surface-container-lowest": "#ffffff",
        "surface-container-high": "#e8e8ea",
        "on-surface-variant": "#3d4a3e",
        "surface-container-low": "#f3f3f6",
        "on-surface": "#1a1c1e",
        "secondary-container": "#fe6a34",
        "on-secondary-container": "#5d1900",
        "primary-container": "#0fa958",
        error: "#ba1a1a",
        "on-error": "#ffffff",
        "error-container": "#ffdad6",
        "on-error-container": "#93000a",
        outline: "#6d7b6d",
        "surface-dim": "#dadadc",
        "on-background": "#1a1c1e"
      },
      fontFamily: {
        headline: ["Plus Jakarta Sans"],
        body: ["Plus Jakarta Sans"]
      },
      borderRadius: {
        DEFAULT: "0.75rem",
        lg: "1.5rem"
      }
    }
  }
};
</script>

<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="w-16 h-16 rounded-2xl bg-primary-container flex items-center justify-center mx-auto mb-4 shadow-xl shadow-primary/20">
      <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
    </div>
    <h1 class="text-3xl font-black font-headline text-[#1b6d24] tracking-tight">Wawa Merchant</h1>
    <p class="text-on-surface-variant text-sm mt-1">Sign in to manage your restaurant</p>
  </div>

  <!-- Card -->
  <div class="bg-surface-container-lowest rounded-xl shadow-[0_8px_32px_rgba(0,109,54,0.10)] p-8">
    <div class="space-y-5">

      <!-- Error/Success Messages -->
      <div id="auth-message" class="hidden text-sm font-medium text-center p-3 rounded-lg"></div>

      <!-- Email -->
      <div>
        <label class="block text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Email Address</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">mail</span>
          <input id="email-input" class="w-full bg-surface-container-low border-0 rounded-lg pl-11 pr-4 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary focus:ring-inset" placeholder="merchant@restaurant.com" type="email"/>
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Password</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock</span>
          <input id="password-input" class="w-full bg-surface-container-low border-0 rounded-lg pl-11 pr-12 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary focus:ring-inset" placeholder="Enter your password" type="password"/>
          <button id="toggle-pw" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant">
            <span class="material-symbols-outlined text-lg">visibility</span>
          </button>
        </div>
      </div>

      <!-- Remember + Forgot -->
      <div class="flex items-center justify-between">
        <label class="flex items-center gap-2 cursor-pointer">
          <input class="w-4 h-4 rounded border-outline text-primary focus:ring-primary" type="checkbox"/>
          <span class="text-sm font-medium text-on-surface-variant">Remember me</span>
        </label>
        <button id="forgot-btn" class="text-sm font-bold text-primary hover:underline">Forgot password?</button>
      </div>

      <!-- Sign In Button -->
      <button id="signin-btn" class="w-full bg-primary text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform text-sm flex items-center justify-center gap-2">
        <span id="signin-spinner" class="material-symbols-outlined animate-spin hidden">progress_activity</span>
        <span id="signin-btn-text">Sign In</span>
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3">
        <div class="flex-1 h-px bg-surface-container-high"></div>
        <span class="text-xs font-semibold text-on-surface-variant">or</span>
        <div class="flex-1 h-px bg-surface-container-high"></div>
      </div>

      <!-- Register Link -->
      <a href="restaurant-register.html" class="w-full border-2 border-surface-container-high text-on-surface font-bold py-4 rounded-lg active:scale-[0.98] transition-transform text-sm flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-lg">store</span>
        Register My Restaurant
      </a>
    </div>
  </div>

  <!-- Back to customer app -->
  <p class="text-center mt-6 text-sm text-on-surface-variant">
    <a class="font-bold text-primary hover:underline" href="customer-home.html">? Back to customer app</a>
  </p>

</div>

<script>
console.log('[signin] page script starting...');
if (typeof firebase === 'undefined') {
  console.error('[signin] firebase NOT defined � SDKs not loaded!');
} else {
  console.log('[signin] firebase defined, auth:', typeof firebase.auth);
}

const signinBtn = document.getElementById('signin-btn');
const signinBtnText = document.getElementById('signin-btn-text');
const signinSpinner = document.getElementById('signin-spinner');
const authMessage = document.getElementById('auth-message');
const emailInput = document.getElementById('email-input');
const passwordInput = document.getElementById('password-input');
const togglePw = document.getElementById('toggle-pw');
const forgotBtn = document.getElementById('forgot-btn');

console.log('[signin] elements found, btn:', !!signinBtn);

// Toggle password visibility
togglePw.addEventListener('click', () => {
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    togglePw.innerHTML = '<span class="material-symbols-outlined text-lg">visibility_off</span>';
  } else {
    passwordInput.type = 'password';
    togglePw.innerHTML = '<span class="material-symbols-outlined text-lg">visibility</span>';
  }
});

// Forgot password
forgotBtn.addEventListener('click', () => {
  const email = emailInput.value.trim();
  if (!email) {
    authMessage.textContent = 'Enter your email address first.';
    authMessage.className = 'text-sm font-medium text-center p-3 rounded-lg bg-error-container text-on-error-container';
    authMessage.classList.remove('hidden');
    return;
  }
  firebase.auth().sendPasswordResetEmail(email)
    .then(() => {
      authMessage.textContent = 'Password reset email sent. Check your inbox.';
      authMessage.className = 'text-sm font-medium text-center p-3 rounded-lg bg-primary-container text-on-primary-container';
      authMessage.classList.remove('hidden');
    })
    .catch((error) => {
      let msg = 'Could not send reset email.';
      if (error.code === 'auth/user-not-found') msg = 'No account found with that email.';
      else if (error.code === 'auth/invalid-email') msg = 'Invalid email address.';
      authMessage.textContent = msg;
      authMessage.className = 'text-sm font-medium text-center p-3 rounded-lg bg-error-container text-on-error-container';
      authMessage.classList.remove('hidden');
    });
});

// Sign in
const showMsg = (text, type) => {
  authMessage.textContent = text;
  authMessage.className = `text-sm font-medium text-center p-3 rounded-lg ${type === 'error' ? 'bg-error-container text-on-error-container' : 'bg-primary-container text-on-primary-container'}`;
  authMessage.classList.remove('hidden');
};

const setLoading = (loading) => {
  signinBtn.disabled = loading;
  signinBtn.classList.toggle('opacity-60', loading);
  signinBtnText.classList.toggle('hidden', loading);
  signinSpinner.classList.toggle('hidden', !loading);
};

signinBtn.addEventListener('click', () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  authMessage.classList.add('hidden');

  if (!email || !password) {
    showMsg('Please enter your email and password.', 'error');
    return;
  }

  setLoading(true);
  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {
      showMsg('Sign in successful! Redirecting�', 'success');
      console.log('[signin] signInWithEmailAndPassword done, waiting for currentUser...');
      // Force wait for Firebase Auth session to persist before navigating
      const checkInterval = setInterval(() => {
        const user = firebase.auth().currentUser;
        if (user) {
          clearInterval(checkInterval);
          console.log('[signin] currentUser SET, uid:', user.uid, '? navigating to dashboard');
          window.location.href = 'restaurant-dashboard.html';
        } else {
          console.log('[signin] currentUser still null...');
        }
      }, 200);
      // Safety net: redirect after 2.5s max
      setTimeout(() => {
        clearInterval(checkInterval);
        const user = firebase.auth().currentUser;
        console.log('[signin] safety net fired, currentUser:', user ? user.uid : 'null');
        window.location.href = 'restaurant-dashboard.html';
      }, 2500);
    })
    .catch((error) => {
      setLoading(false);
      let msg = 'Sign in failed. Please try again.';
      if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
        msg = 'Invalid email or password.';
      } else if (error.code === 'auth/too-many-requests') {
        msg = 'Too many failed attempts. Try again later.';
      }
      showMsg(msg, 'error');
    });
});

// Enter key to sign in
passwordInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') signinBtn.click();
});
</script>

</body>
</html>
