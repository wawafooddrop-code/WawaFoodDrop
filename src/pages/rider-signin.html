<body class="min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="w-16 h-16 rounded-2xl bg-primary flex items-center justify-center mx-auto mb-4 shadow-xl shadow-primary/20">
      <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">delivery_dining</span>
    </div>
    <h1 class="text-3xl font-black font-headline text-primary tracking-tight">Wawa Rider</h1>
    <p class="text-on-surface-variant text-sm mt-1">Sign in to start delivering</p>
  </div>

  <!-- Card -->
  <div class="bg-surface-container-lowest rounded-xl shadow-[0_8px_32px_rgba(15,169,88,0.10)] p-8">
    <div class="space-y-5">

      <div id="auth-message" class="hidden text-sm font-medium text-center p-3 rounded-lg"></div>

      <!-- Email -->
      <div>
        <label class="block text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Email Address</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">mail</span>
          <input id="email-input" class="w-full bg-surface-container-low border-0 rounded-lg pl-11 pr-4 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary focus:ring-inset" placeholder="rider@wawafood.com" type="email"/>
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Password</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock</span>
          <input id="password-input" class="w-full bg-surface-container-low border-0 rounded-lg pl-11 pr-12 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary focus:ring-inset" placeholder="Enter your password" type="password"/>
          <button id="toggle-pw" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant">
            <span class="material-symbols-outlined text-lg">visibility</span>
          </button>
        </div>
      </div>

      <!-- Remember -->
      <div class="flex items-center justify-between">
        <label class="flex items-center gap-2 cursor-pointer">
          <input class="w-4 h-4 rounded border-outline text-primary focus:ring-primary" type="checkbox"/>
          <span class="text-sm font-medium text-on-surface-variant">Remember me</span>
        </label>
      </div>

      <!-- Sign In Button -->
      <button id="signin-btn" class="w-full bg-primary text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform text-sm flex items-center justify-center gap-2">
        <span id="signin-spinner" class="material-symbols-outlined animate-spin hidden">progress_activity</span>
        <span id="signin-btn-text">Sign In as Rider</span>
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3">
        <div class="flex-1 h-px bg-surface-container-high"></div>
        <span class="text-xs font-semibold text-on-surface-variant">or</span>
        <div class="flex-1 h-px bg-surface-container-high"></div>
      </div>

      <!-- Register Link -->
      <a href="rider-register.html" class="w-full border-2 border-surface-container-high text-on-surface font-bold py-4 rounded-lg active:scale-[0.98] transition-transform text-sm flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-lg">how_to_reg</span>
        Apply as Rider
      </a>
    </div>
  </div>

  <!-- Back -->
  <p class="text-center mt-6 text-sm text-on-surface-variant">
    <a class="font-bold text-primary hover:underline" href="customer-home.html">← Back to customer app</a>
  </p>

</body></html>
<script src="../scripts/firebase.js"></script>

</body></html>
<script>
const signinBtn = document.getElementById('signin-btn');
const signinBtnText = document.getElementById('signin-btn-text');
const signinSpinner = document.getElementById('signin-spinner');
const authMessage = document.getElementById('auth-message');
const emailInput = document.getElementById('email-input');
const passwordInput = document.getElementById('password-input');
const togglePw = document.getElementById('toggle-pw');

// If already signed in — check riders doc and go to dashboard if it exists
firebase.auth().onAuthStateChanged((user) => {
  if (!user) return;
  db.collection('riders').doc(user.uid).get().then(doc => {
    if (doc.exists) window.location.href = 'rider-dashboard.html';
  });
});

// Toggle password
togglePw.addEventListener('click', () => {
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    togglePw.innerHTML = '<span class="material-symbols-outlined text-lg">visibility_off</span>';
  } else {
    passwordInput.type = 'password';
    togglePw.innerHTML = '<span class="material-symbols-outlined text-lg">visibility</span>';
  }
});

const showMsg = (text, type) => {
  authMessage.textContent = text;
  authMessage.className = `text-sm font-medium text-center p-3 rounded-lg ${type === 'error' ? 'bg-error-container text-on-error-container' : 'bg-primary-container text-on-primary-container'}`;
  authMessage.classList.remove('hidden');
};

const setLoading = (loading) => {
  signinBtn.disabled = loading;
  signinBtn.classList.toggle('opacity-60', loading);
  signinBtnText.classList.toggle('hidden', loading);
  signinSpinner.classList.toggle('hidden', !loading);
};

signinBtn.addEventListener('click', () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  authMessage.classList.add('hidden');

  if (!email || !password) {
    showMsg('Please enter your email and password.', 'error');
    return;
  }

  setLoading(true);
  firebase.auth().signInWithEmailAndPassword(email, password)
    .then((userCredential) => {
      const uid = userCredential.user.uid;
      window.__debugAuth('signInWithEmailAndPassword SUCCESS', { uid });
      // Step 1: Check riders doc
      return db.collection('riders').doc(uid).get();
    })
    .then(doc => {
      window.__debugAuth('riders doc check', doc.exists ? 'EXISTS' : 'NOT FOUND');
      if (doc.exists) {
        window.location.href = 'rider-dashboard.html';
        return;
      }
      // Step 2: Riders doc missing — check riderApplications
      const uid = firebase.auth().currentUser.uid;
      return db.collection('riderApplications').doc(uid).get();
    })
    .then(appDoc => {
      window.__debugAuth('riderApplications check', appDoc && appDoc.exists ? appDoc.data().status : 'NOT FOUND');
      if (!appDoc || !appDoc.exists) {
        showMsg('No rider account found. Please apply as a rider first.', 'error');
        setLoading(false);
        return;
      }
      const status = appDoc.data().status;
      if (status === 'pending') {
        showMsg('Your application is still pending approval. Please wait for confirmation.', 'error');
        setLoading(false);
        return;
      }
      if (status === 'rejected') {
        showMsg('Your application was rejected. Please contact support.', 'error');
        setLoading(false);
        return;
      }
      if (status === 'approved') {
        // Admin approved but riders doc somehow missing — recreate it on-the-fly
        const uid = firebase.auth().currentUser.uid;
        const app = appDoc.data();
        return db.collection('riders').doc(uid).set({
          uid: uid,
          name: app.name,
          email: app.email,
          phone: app.phone,
          address: app.address,
          vehicleType: app.vehicleType,
          plateNumber: app.plateNumber,
          idPictureUrl: app.idPictureUrl || '',
          status: 'offline',
          rating: 0,
          deliveries: 0,
          totalEarnings: 0,
          totalWawaCutOwed: 0,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
          window.__debugAuth(' riders doc recreated on-the-fly', uid);
          window.location.href = 'rider-dashboard.html';
        });
      }
      // Unknown status — block
      showMsg('No rider account found. Please apply as a rider first.', 'error');
      setLoading(false);
    })
    .catch((error) => {
      setLoading(false);
      let msg = 'Sign in failed. Please try again.';
      if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
        msg = 'Invalid email or password.';
      } else if (error.code === 'auth/too-many-requests') {
        msg = 'Too many attempts. Try again later.';
      }
      showMsg(msg, 'error');
    });
});

passwordInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') signinBtn.click();
});
</script>

</body></html>
