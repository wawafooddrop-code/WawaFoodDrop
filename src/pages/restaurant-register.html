<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register Restaurant - Wawa Food Drop</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        secondary: "#ab3500",
        primary: "#006d36",
        background: "#f9f9fc",
        "on-primary": "#ffffff",
        "on-secondary": "#ffffff",
        "surface-container-lowest": "#ffffff",
        "surface-container-high": "#e8e8ea",
        "on-surface-variant": "#3d4a3e",
        "surface-container-low": "#f3f3f6",
        "on-surface": "#1a1c1e",
        "secondary-container": "#fe6a34",
        "on-secondary-container": "#5d1900",
        "primary-container": "#0fa958",
        error: "#ba1a1a",
        "on-error": "#ffffff",
        "error-container": "#ffdad6",
        "on-error-container": "#93000a",
        outline: "#6d7b6d",
        "surface-dim": "#dadadc",
        "on-background": "#1a1c1e"
      },
      fontFamily: {
        headline: ["Plus Jakarta Sans"],
        body: ["Plus Jakarta Sans"]
      },
      borderRadius: {
        DEFAULT: "0.75rem",
        lg: "1.5rem"
      }
    }
  }
};
</script>
<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="w-16 h-16 rounded-2xl bg-primary-container flex items-center justify-center mx-auto mb-4 shadow-xl shadow-primary/20">
      <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">store</span>
    </div>
    <h1 class="text-3xl font-black font-headline text-[#1b6d24] tracking-tight">Register Restaurant</h1>
    <p class="text-on-surface-variant text-sm mt-1">Join Wawa Food Drop as a merchant</p>
  </div>

  <!-- Card -->
  <div class="bg-surface-container-lowest rounded-xl shadow-[0_8px_32px_rgba(0,109,54,0.10)] p-8">
    <div class="space-y-5">

      <!-- Error/Success Messages -->
      <div id="auth-message" class="hidden text-sm font-medium text-center p-3 rounded-lg"></div>

      <!-- Restaurant Name -->
      <div>
        <label class="block text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Restaurant Name</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">restaurant</span>
          <input id="restaurant-name" class="w-full bg-surface-container-low border-0 rounded-lg pl-11 pr-4 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary focus:ring-inset" placeholder="Wawa Food Drop" type="text"/>
        </div>
      </div>

      <!-- Branch / Location -->
      <div>
        <label class="block text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Branch / Location</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">location_on</span>
          <input id="branch-name" class="w-full bg-surface-container-low border-0 rounded-lg pl-11 pr-4 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary focus:ring-inset" placeholder="Banisilan Branch" type="text"/>
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Email Address</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">mail</span>
          <input id="email-input" class="w-full bg-surface-container-low border-0 rounded-lg pl-11 pr-4 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary focus:ring-inset" placeholder="merchant@restaurant.com" type="email"/>
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Password</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock</span>
          <input id="password-input" class="w-full bg-surface-container-low border-0 rounded-lg pl-11 pr-12 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary focus:ring-inset" placeholder="Min. 8 characters" type="password"/>
          <button id="toggle-pw" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant">
            <span class="material-symbols-outlined text-lg">visibility</span>
          </button>
        </div>
        <!-- Password strength -->
        <div id="pw-strength" class="mt-2 flex gap-1">
          <div id="str-bar-1" class="h-1 flex-1 rounded-full bg-surface-container-high"></div>
          <div id="str-bar-2" class="h-1 flex-1 rounded-full bg-surface-container-high"></div>
          <div id="str-bar-3" class="h-1 flex-1 rounded-full bg-surface-container-high"></div>
          <div id="str-bar-4" class="h-1 flex-1 rounded-full bg-surface-container-high"></div>
        </div>
        <p id="pw-hint" class="text-[11px] mt-1 text-on-surface-variant"></p>
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Confirm Password</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock</span>
          <input id="confirm-password-input" class="w-full bg-surface-container-low border-0 rounded-lg pl-11 pr-12 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary focus:ring-inset" placeholder="Repeat your password" type="password"/>
          <button id="toggle-cpw" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant">
            <span class="material-symbols-outlined text-lg">visibility</span>
          </button>
        </div>
      </div>

      <!-- Terms -->
      <p class="text-xs text-on-surface-variant text-center">
        By registering, you agree to Wawa Food Drop's
        <a href="#" class="font-bold text-primary hover:underline">Merchant Terms</a>.
      </p>

      <!-- Register Button -->
      <button id="register-btn" class="w-full bg-primary text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform text-sm flex items-center justify-center gap-2">
        <span id="register-spinner" class="material-symbols-outlined animate-spin hidden">progress_activity</span>
        <span id="register-btn-text">Register My Restaurant</span>
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3">
        <div class="flex-1 h-px bg-surface-container-high"></div>
        <span class="text-xs font-semibold text-on-surface-variant">or</span>
        <div class="flex-1 h-px bg-surface-container-high"></div>
      </div>

      <!-- Sign In Link -->
      <a href="restaurant-signin.html" class="w-full border-2 border-surface-container-high text-on-surface font-bold py-4 rounded-lg active:scale-[0.98] transition-transform text-sm flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-lg">login</span>
        Sign In Instead
      </a>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="../scripts/firebase.js"></script>
<script>
const registerBtn = document.getElementById('register-btn');
const registerBtnText = document.getElementById('register-btn-text');
const registerSpinner = document.getElementById('register-spinner');
const authMessage = document.getElementById('auth-message');
const emailInput = document.getElementById('email-input');
const passwordInput = document.getElementById('password-input');
const confirmPasswordInput = document.getElementById('confirm-password-input');
const restaurantNameInput = document.getElementById('restaurant-name');
const branchNameInput = document.getElementById('branch-name');
const togglePw = document.getElementById('toggle-pw');
const toggleCpW = document.getElementById('toggle-cpw');

// Password strength meter
const strBars = [
  document.getElementById('str-bar-1'),
  document.getElementById('str-bar-2'),
  document.getElementById('str-bar-3'),
  document.getElementById('str-bar-4')
];
const pwHint = document.getElementById('pw-hint');

const updateStrength = (pw) => {
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const colors = ['bg-error', 'bg-secondary', 'bg-primary', 'bg-primary-container'];
  const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
  strBars.forEach((b, i) => {
    b.className = `h-1 flex-1 rounded-full ${i < score ? colors[score] : 'bg-surface-container-high'}`;
  });
  pwHint.textContent = pw.length > 0 ? labels[score] : '';
};

passwordInput.addEventListener('input', () => updateStrength(passwordInput.value));

// Toggle password visibility
const makeToggle = (btn, input) => {
  btn.addEventListener('click', () => {
    if (input.type === 'password') {
      input.type = 'text';
      btn.innerHTML = '<span class="material-symbols-outlined text-lg">visibility_off</span>';
    } else {
      input.type = 'password';
      btn.innerHTML = '<span class="material-symbols-outlined text-lg">visibility</span>';
    }
  });
};
makeToggle(togglePw, passwordInput);
makeToggle(toggleCpW, confirmPasswordInput);

// Auth message helper
const showMsg = (text, type) => {
  authMessage.textContent = text;
  authMessage.className = `text-sm font-medium text-center p-3 rounded-lg ${type === 'error' ? 'bg-error-container text-on-error-container' : 'bg-primary-container text-on-primary-container'}`;
  authMessage.classList.remove('hidden');
};

const setLoading = (loading) => {
  registerBtn.disabled = loading;
  registerBtn.classList.toggle('opacity-60', loading);
  registerBtnText.classList.toggle('hidden', loading);
  registerSpinner.classList.toggle('hidden', !loading);
};

// Register
registerBtn.addEventListener('click', () => {
  const name = restaurantNameInput.value.trim();
  const branch = branchNameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  const confirmPw = confirmPasswordInput.value;

  authMessage.classList.add('hidden');

  if (!name || !branch || !email || !password || !confirmPw) {
    showMsg('Please fill in all fields.', 'error');
    return;
  }
  if (password.length < 8) {
    showMsg('Password must be at least 8 characters.', 'error');
    return;
  }
  if (password !== confirmPw) {
    showMsg('Passwords do not match.', 'error');
    return;
  }

  setLoading(true);
  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then((userCredential) => {
      // Create restaurant document in 'restaurants' collection — goes live immediately, no admin approval
      const uid = userCredential.user.uid;
      return db.collection('restaurants').doc(uid).set({
        name: name,
        cuisine: '',
        address: branch,
        phone: '',
        email: email,
        isOpen: false,
        approvalStatus: 'approved',
        uid: uid,
        description: '',
        rating: 4.8,
        deliveryFee: 45,
        deliveryTime: '25-35 min',
        imageUrl: '',
        minOrder: 150,
        openingHours: '8:00 AM - 10:00 PM',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => userCredential);
    })
    .then(() => {
      showMsg('Restaurant registered! Redirecting…', 'success');
      setTimeout(() => window.location.href = 'restaurant-dashboard.html', 800);
    })
    .catch((error) => {
      setLoading(false);
      let msg = 'Registration failed. Please try again.';
      if (error.code === 'auth/email-already-in-use') {
        msg = 'An account with this email already exists.';
      } else if (error.code === 'auth/invalid-email') {
        msg = 'Invalid email address.';
      } else if (error.code === 'auth/weak-password') {
        msg = 'Password is too weak.';
      }
      showMsg(msg, 'error');
    });
});

// Enter key to register
confirmPasswordInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') registerBtn.click();
});
</script>
</body>
</html>
