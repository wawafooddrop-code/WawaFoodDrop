<!-- Support FAB -->

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>


<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>


<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>


<script src="scripts/firebase.js"></script>


<script>
// ==================== AUTH GUARD ====================
let currentRiderUid = null;
let currentRiderName = null;
let currentRiderIsOnline = true;

// Sync duty state across pages via localStorage
function getStoredDuty() {
  try { return localStorage.getItem('wawa_rider_duty') === 'true'; } catch(e) { return true; }
}
function setStoredDuty(val) {
  try { localStorage.setItem('wawa_rider_duty', val ? 'true' : 'false'); } catch(e) {}
}

firebase.auth().onAuthStateChanged((user) => {
  if (!user) { window.location.href = 'rider-signin.html'; return; }
  db.collection('riders').doc(user.uid).get().then(doc => {
    if (!doc.exists) { window.location.href = 'rider-signin.html'; return; }
    const d = doc.data();
    currentRiderUid = user.uid;
    currentRiderName = d.name || user.email;
    currentRiderIsOnline = d.isOnline !== false;
    setStoredDuty(currentRiderIsOnline);
    document.getElementById('rider-name').textContent = currentRiderName;
    document.getElementById('rider-rating').textContent = d.rating || '4.9';
    loadOrders();
  });
});

// ==================== LOAD ORDERS ====================
function loadOrders() {
  // Read latest duty state from localStorage (may have been toggled on another page)
  currentRiderIsOnline = getStoredDuty();
  if (!currentRiderIsOnline) {
    document.getElementById('jobs-grid').innerHTML = `
      <div class="col-span-full text-center py-16">
        <span class="material-symbols-outlined text-5xl text-surface-container">nightlight</span>
        <p class="mt-3 font-bold text-on-surface-variant">You're off duty</p>
        <p class="text-sm text-on-surface-variant/70">Toggle the rider status to start receiving orders</p>
      </div>
    `;
    return;
  }
  db.collection('orders')
    .where('status', 'in', ['preparing', 'ready_for_pickup'])
    .orderBy('createdAt', 'desc')
    .get()
    .then(snapshot => {
      const orders = [];
      snapshot.forEach(doc => {
        const d = doc.data();
        d.id = doc.id;
        // Show if: unclaimed, or belongs to this rider
        if (!d.riderId || d.riderId === currentRiderUid) {
          orders.push(d);
        }
      });
      renderJobsGrid(orders, currentRiderUid);
    })
    .catch(e => {
      console.error('loadOrders error:', e);
      document.getElementById('jobs-grid').innerHTML = '<p class="text-red-500">Failed to load orders.</p>';
    });
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const mainContent = document.getElementById('main-content');
  sidebar.classList.toggle('hidden-sidebar');
  document.body.classList.toggle('sidebar-open');
  if (window.innerWidth >= 1024) {
    mainContent.style.marginLeft = sidebar.classList.contains('hidden-sidebar') ? '0' : '256px';
  }
}
window.addEventListener('resize', () => {
  if (window.innerWidth < 1024) {
    document.getElementById('main-content').style.marginLeft = '0';
    document.getElementById('sidebar').classList.add('hidden-sidebar');
    document.body.classList.remove('sidebar-open');
  } else if (!document.getElementById('sidebar').classList.contains('hidden-sidebar')) {
    document.getElementById('main-content').style.marginLeft = '256px';
  }
});
if (window.innerWidth >= 1024) {
  document.getElementById('sidebar').classList.remove('hidden-sidebar');
  document.getElementById('main-content').style.marginLeft = '256px';
}

// ==================== LOGOUT ====================
document.querySelectorAll('[data-logout-btn]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (confirm('Sign out from this device?')) {
      firebase.auth().signOut().then(() => {
        window.location.href = 'rider-signin.html';
      });
    }
  });
});

// ==================== ACCEPT ORDER ====================
function acceptOrder(orderId, action) {
  const user = firebase.auth().currentUser;
  if (!user) return;
  const updates = { riderId: user.uid, riderName: currentRiderName };
  // Rider claims a preparing order � just stake it, do NOT change status.
  // Restaurant's 'Mark as Ready' is what transitions to ready_for_pickup.
  if (action === 'preparing') {
    // status stays 'preparing' � just record the rider
  } else if (action === 'ready_for_pickup') {
    updates.status = 'picked_up';
  }
  db.collection('orders').doc(orderId).update(updates)
    .then(() => loadOrders())
    .catch(e => {
      console.error('DEBUG update error:', e.code, e.message);
      alert('Failed: ' + e.code + ' — ' + e.message);
    });
}

function calcRiderCommission(subtotal) {
  const tiers = window.rateTiers || [];
  const tier = tiers.find(t => subtotal >= t.minCost && (t.maxCost === null || subtotal <= t.maxCost));
  if (!tier) return tiers.length ? calcRC(tiers[tiers.length - 1], subtotal) : 0;
  return calcRC(tier, subtotal);
}
function calcRC(tier, orderCost) {
  if (typeof tier.riderCommission !== "object") return tier.riderCommission ? 0 : 0;
  return (tier.riderCommission.flat || 0) + (tier.riderCommission.percent || 0) / 100 * Math.max(0, orderCost - tier.minCost);
}

function renderJobsGrid(orders, myUid) {
  const grid = document.getElementById('jobs-grid');
  if (!orders || orders.length === 0) {
    grid.innerHTML = `
      <div class="col-span-full text-center py-16">
        <span class="material-symbols-outlined text-5xl text-surface-container">inbox</span>
        <p class="mt-3 font-bold text-on-surface-variant">No available orders right now</p>
        <p class="text-sm text-on-surface-variant/70">New orders appear here automatically</p>
      </div>
    `;
    return;
  }
  // Batch-fetch restaurant names for all unique restaurant IDs
  const restIds = [...new Set(orders.map(o => o.restaurantId).filter(Boolean))];
  const namePromises = restIds.map(id =>
    db.collection('restaurants').doc(id).get().then(d => [id, d.exists ? d.data().name : null])
  );
  Promise.all(namePromises).then(pairs => {
    const restNames = Object.fromEntries(pairs.filter(([, name]) => name));
    grid.innerHTML = orders.map(order => {
    const totalCost = (order.total || 0);
    const orderId = (order.id || '').toUpperCase();
    const isPreparing = order.status === 'preparing';
    const isOwn = order.riderId === myUid;
    const restName = restNames[order.restaurantId] || order.restaurantName || 'Restaurant';

    let badge, button;
    const isPickedUp = order.status === 'picked_up' && isOwn;

    if (isPickedUp) {
      badge = '<span class="bg-blue-100 text-blue-700 text-[10px] font-black px-2 py-0.5 rounded-full uppercase tracking-wider">Waiting to Handover</span>';
      button = '<button class="w-full bg-surface-container text-on-surface-variant font-bold py-3 rounded-full cursor-default" disabled>Waiting to Handover</button>';
    } else if (isPreparing && isOwn) {
      badge = '<span class="bg-blue-100 text-blue-700 text-[10px] font-black px-2 py-0.5 rounded-full uppercase tracking-wider">Head to Restaurant</span>';
      button = '<button class="w-full bg-surface-container text-on-surface-variant font-bold py-3 rounded-full cursor-default" disabled>Head to Restaurant</button>';
    } else if (isPreparing) {
      badge = '<span class="bg-amber-100 text-amber-700 text-[10px] font-black px-2 py-0.5 rounded-full uppercase tracking-wider">Headed to Restaurant</span>';
      button = '<button onclick="acceptOrder(\'' + order.id + '\', \'preparing\')" class="w-full bg-primary text-white font-bold py-3 rounded-full hover:scale-[1.02] active:scale-95 transition-all">Claim Order</button>';
    } else {
      // ready_for_pickup: rider has already claimed ? show "Pick Up" button
      badge = '<span class="bg-emerald-100 text-emerald-700 text-[10px] font-black px-2 py-0.5 rounded-full uppercase tracking-wider">Ready for Pickup</span>';
      button = '<button onclick="acceptOrder(\'' + order.id + '\', \'ready_for_pickup\')" class="w-full bg-secondary text-white font-bold py-3 rounded-full hover:scale-[1.02] active:scale-95 transition-all">Pick Up</button>';
    }

    return `
        <div class="bg-surface-container-lowest p-5 rounded-card border border-outline-variant/30 flex flex-col gap-3 hover:shadow-lg transition-all">
      <div class="flex justify-between items-start gap-3">
        <div class="flex flex-col gap-1">
          <p class="text-[10px] text-on-surface-variant font-bold uppercase tracking-widest">Order ID</p>
          <p class="font-mono font-extrabold text-sm text-primary">#${orderId.substring(0, 8)}</p>
        </div>
        <div class="text-right flex flex-col gap-1">
          <p class="text-2xl font-black font-headline text-secondary">?${((order.subtotal||0) + (order.deliveryFee||0)).toLocaleString('en-PH', { minimumFractionDigits: 2 })}</p>
          <p class="text-[10px] text-on-surface-variant font-bold uppercase tracking-widest">Total</p>
        </div>
      </div>
      <div class="border-t border-outline-variant/30"></div>
      <div class="flex justify-between items-start gap-3">
        <div class="flex flex-col gap-1">
          <h4 class="font-bold text-base text-on-surface">${restName}</h4>
          <div class="flex items-center gap-1 text-on-surface-variant text-xs">
            <span class="material-symbols-outlined text-xs" style="font-size:14px">location_on</span>
            <span>${order.deliveryAddress || order.customerAddress || '-'}</span>
          </div>
          <div class="flex items-center gap-1 text-on-surface-variant text-xs">
            <span class="material-symbols-outlined text-xs" style="font-size:14px">shopping_bag</span>
            <span>${(order.items || []).length} item${(order.items || []).length !== 1 ? 's' : ''}</span>
          </div>
        </div>
        <div class="text-right flex flex-col gap-1">
          <div class="flex justify-between gap-3 text-xs">
            <span class="text-on-surface-variant">Order Cost</span>
            <span class="font-semibold text-on-surface">?${(order.subtotal||0).toLocaleString('en-PH', { minimumFractionDigits: 2 })}</span>
          </div>
          <div class="flex justify-between gap-3 text-xs">
            <span class="text-on-surface-variant">Delivery Fee</span>
            <span class="font-semibold text-on-surface">?${(order.deliveryFee||0).toLocaleString('en-PH', { minimumFractionDigits: 2 })}</span>
          </div>
        </div>
      </div>
      ${badge}
      ${button}
    </div>
  `;
    });
  });
  }
</script>
