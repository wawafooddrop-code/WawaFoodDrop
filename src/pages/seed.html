async function seed() {
  const statusBox = document.getElementById('statusBox');
  const statusText = document.getElementById('statusText');
  const detailText = document.getElementById('detailText');
  const spinner = document.getElementById('spinner');

  try {
    // Test connection first
    statusText.textContent = 'Connecting to Firestore...';
    await db.collection('__test').limit(1).get();

    statusText.textContent = 'Seeding restaurants...';
    
    // Seed restaurants
    for (const r of restaurants) {
      await db.collection('restaurants').add(r);
    }

    statusText.textContent = 'Seeding menu items...';
    
    // Seed menu items
    for (const m of menuItems) {
      await db.collection('menu_items').add({ ...m, available: true });
    }

    spinner.style.display = 'none';
    statusBox.style.display = 'block';
    statusBox.className = 'status success';
    statusBox.textContent = '✅ Data seeded successfully!';
    statusText.textContent = 'Redirecting...';
    detailText.style.display = 'block';
    detailText.textContent = '3 restaurants + 9 menu items added.';

    setTimeout(() => {
      window.location.href = 'customer-home.html';
    }, 2000);

  } catch (err) {
    spinner.style.display = 'none';
    statusBox.style.display = 'block';
    statusBox.className = 'status error';
    statusText.textContent = '❌ Seeding failed';
    detailText.style.display = 'block';
    detailText.textContent = err.message;
    console.error(err);
  }
}
