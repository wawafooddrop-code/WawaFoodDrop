<body class="kinetic-bg font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-4 md:p-8">

<!-- Loading Overlay -->
<div id="loadingOverlay" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center">
  <div class="bg-white rounded-2xl p-8 shadow-2xl flex flex-col items-center gap-4 min-w-[280px]">
    <div class="w-12 h-12 border-4 border-secondary/20 border-t-secondary rounded-full animate-spin"></div>
    <p class="font-bold text-on-surface" id="loadingText">Signing in...</p>
  </div>
</div>

<!-- Error Toast -->
<div id="errorToast" class="hidden fixed top-6 left-1/2 -translate-x-1/2 bg-error-container text-error px-6 py-4 rounded-xl shadow-xl font-bold flex items-center gap-3 z-[110] transition-all opacity-0 -translate-y-4">
  <span class="material-symbols-outlined text-error">error</span>
  <span id="errorMsg">Something went wrong</span>
</div>

<!-- Auth Canvas -->
<main class="w-full max-w-2xl flex flex-col gap-8">

  <!-- Main Auth Card -->
  <div class="bg-surface-container-lowest rounded-xl shadow-[0_32px_64px_-12px_rgba(255,107,53,0.08)] overflow-hidden">

    <div class="p-8 md:p-12">

      <!-- Branding Anchor -->
      <div class="flex flex-col items-center mb-10 text-center">
        <img src="assets/logo.png" alt="Wawa Food Drop" class="w-20 h-20 mb-4 rounded-full shadow-lg object-cover">
        <h1 class="text-3xl md:text-4xl font-black tracking-tight bg-clip-text text-transparent brand-gradient">Wawa Food Drop</h1>
        <p class="text-on-surface-variant mt-2 font-medium">Freshness delivered to your doorstep</p>
      </div>

      <!-- Tab Toggle -->
      <div class="flex bg-surface-container-low p-1.5 rounded-full mb-8 max-w-xs mx-auto">
        <button id="signInTab" class="flex-1 py-2.5 px-6 rounded-full text-sm font-bold transition-all bg-surface-container-lowest text-on-surface shadow-sm">Sign In</button>
        <button id="signUpTab" onclick="window.location.href='sign-up.html'" class="flex-1 py-2.5 px-6 rounded-full text-sm font-bold transition-all text-on-surface-variant hover:text-on-surface">Sign Up</button>
      </div>

      <!-- Form Section -->
      <form id="signInForm" class="space-y-6">
        <div class="space-y-2">
          <label class="block text-sm font-bold text-on-surface-variant ml-4">Email Address</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
            <input id="email" class="w-full bg-surface-container-low border-none rounded-full py-4 pl-14 pr-6 focus:ring-2 focus:ring-primary-container transition-all placeholder:text-on-surface-variant/50" placeholder="chef@wawafood.com" type="email"/>
          </div>
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-bold text-on-surface-variant ml-4">Password</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
            <input id="password" class="w-full bg-surface-container-low border-none rounded-full py-4 pl-14 pr-12 focus:ring-2 focus:ring-primary-container transition-all" placeholder="••••••••" type="password"/>
            <button id="togglePassword" class="absolute right-5 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-secondary transition-colors" type="button">
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between px-2">
          <label class="flex items-center gap-2 cursor-pointer group">
            <input class="w-5 h-5 rounded-md border-outline text-primary focus:ring-primary-container bg-surface-container-low" type="checkbox"/>
            <span class="text-sm font-medium text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
          </label>
          <a class="text-sm font-bold text-primary hover:underline" href="#">Forgot password?</a>
        </div>

        <!-- Primary Action -->
        <button id="submitBtn" class="w-full brand-gradient text-white py-5 rounded-full font-extrabold text-lg shadow-xl shadow-orange-500/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3" type="submit">
          <span id="btnText">Start Eating</span>
          <span class="material-symbols-outlined" id="btnArrow">arrow_forward</span>
          <div id="btnSpinner" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
        </button>

        <!-- Guest option -->
        <p class="text-center text-sm text-on-surface-variant mt-4">
          <a href="customer-home.html" class="font-bold text-primary hover:underline">Continue as Guest</a>
          — no account needed
        </p>
      </form>

      <!-- Social Auth -->
      <div class="mt-10 pt-10 border-t border-surface-container">
        <p class="text-center text-sm font-bold text-on-surface-variant mb-6">Or continue with</p>
        <div class="grid grid-cols-2 gap-4">
          <button id="googleSignInBtn" class="flex items-center justify-center gap-3 py-3 px-6 rounded-full bg-surface-container-low font-bold text-on-surface hover:bg-surface-container-high transition-colors">
            <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button class="flex items-center justify-center gap-3 py-3 px-6 rounded-full bg-surface-container-low font-bold text-on-surface hover:bg-surface-container-high transition-colors">
            <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </button>
        </div>
      </div>

    </div>
  </div>

  </main>

<!-- Decoration Assets (Asymmetric Accents) -->
<div class="fixed top-[-10%] right-[-5%] w-[40vw] h-[40vw] bg-primary-fixed/10 rounded-full blur-[100px] -z-10"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-[30vw] h-[30vw] bg-secondary-fixed/20 rounded-full blur-[80px] -z-10"></div>

<script>
// --- Firebase Init ------------------------------------------------------------
const firebaseConfig = {
  apiKey: "AIzaSyCJ3ybFxxzDkQgMQst6WhhqSZ5K6gyJpuM",
  authDomain: "wawa-food-drop-c38ee.firebaseapp.com",
  projectId: "wawa-food-drop-c38ee"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// --- UI Helpers -------------------------------------------------------------
function showLoading(text) {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingOverlay').classList.remove('hidden');
}
function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }
function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  const t = document.getElementById('errorToast');
  t.classList.remove('hidden', 'opacity-0', '-translate-y-4');
  t.classList.add('opacity-100', 'translate-y-0');
  setTimeout(() => {
    t.classList.add('hidden', 'opacity-0', '-translate-y-4');
    t.classList.remove('opacity-100', 'translate-y-0');
  }, 4000);
}
function setBtnLoading(on) {
  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('btnSpinner');
  const text = document.getElementById('btnText');
  const arrow = document.getElementById('btnArrow');
  if (on) {
    spinner.classList.remove('hidden');
    arrow.classList.add('hidden');
    text.textContent = 'Signing in...';
    btn.disabled = true;
    btn.classList.add('opacity-70', 'cursor-not-allowed');
  } else {
    spinner.classList.add('hidden');
    arrow.classList.remove('hidden');
    text.textContent = 'Start Eating';
    btn.disabled = false;
    btn.classList.remove('opacity-70', 'cursor-not-allowed');
  }
}

// --- Password Toggle ---------------------------------------------------------
document.getElementById('togglePassword').addEventListener('click', function() {
  const input = document.getElementById('password');
  const icon = this.querySelector('.material-symbols-outlined');
  if (input.type === 'password') {
    input.type = 'text';
    icon.textContent = 'visibility_off';
  } else {
    input.type = 'password';
    icon.textContent = 'visibility';
  }
});

// --- Auth Handler -------------------------------------------------------------

function getUrlParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}
const redirectUrl = getUrlParam('redirect');

document.getElementById('signInForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    showError('Please fill in all fields.');
    return;
  }

  setBtnLoading(true);
  showLoading('Signing in securely...');

  try {
    // Step 1: Firebase Auth sign-in (hashed + salted server-side)
    const userCredential = await auth.signInWithEmailAndPassword(email, password);
    const uid = userCredential.user.uid;

    // Step 2: Determine user role from Firestore (parallel queries)
    const [restSnap, custSnap, riderSnap, adminSnap] = await Promise.all([
      db.collection('restaurants').where('uid', '==', uid).limit(1).get(),
      db.collection('customers').doc(uid).get(),
      db.collection('riders').doc(uid).get(),
      db.collection('admins').doc(uid).get()
    ]);

    // Step 3: Route by role
    if (!restSnap.empty) {
      const restaurant = restSnap.docs[0];
      localStorage.setItem('wawa_restaurant', JSON.stringify({
        id: restaurant.id,
        name: restaurant.data().name
      }));
      window.location.href = `restaurant-dashboard.html?id=${restaurant.id}`;
      return;
    }

    if (custSnap.exists) {
      const customer = custSnap.data();
      localStorage.setItem('wawa_user', JSON.stringify({
        id: uid,
        email: customer.email,
        name: customer.name || email.split('@')[0]
      }));
      window.location.href = redirectUrl ? decodeURIComponent(redirectUrl) : 'customer-home.html';
      return;
    }

    if (riderSnap.exists) {
      const rider = riderSnap.data();
      localStorage.setItem('wawa_rider', JSON.stringify({
        id: uid,
        email: rider.email,
        name: rider.name || email.split('@')[0]
      }));
      window.location.href = 'rider-dashboard.html';
      return;
    }

    if (adminSnap.exists) {
      localStorage.setItem('wawa_admin', JSON.stringify({
        id: uid,
        email: email,
        role: adminSnap.data().role || 'admin'
      }));
      window.location.href = 'admin-dashboard.html';
      return;
    }

    // No role found — sign out and show error
    await auth.signOut();
    showError('Account exists but has no assigned role. Contact support.');

  } catch (err) {
    console.error(err);
    let msg = 'Sign-in failed.';
    if (err.code === 'auth/user-not-found') msg = 'No account found with this email.';
    if (err.code === 'auth/wrong-password') msg = 'Incorrect password.';
    if (err.code === 'auth/invalid-credential') msg = 'Email or password is incorrect. Please try again.';
    if (err.code === 'auth/too-many-requests') msg = 'Too many attempts. Try again later.';
    if (err.code === 'auth/invalid-email') msg = 'Invalid email address.';
    showError(msg);
  } finally {
    hideLoading();
    setBtnLoading(false);
  }
});

// --- Google Sign-In ----------------------------------------------------------
document.getElementById('googleSignInBtn').addEventListener('click', async () => {
  showLoading('Signing in with Google...');
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    const result = await auth.signInWithPopup(provider);
    const uid = result.user.uid;
    const email = result.user.email;

    // Check if user exists in any role
    const [custSnap, restSnap, riderSnap] = await Promise.all([
      db.collection('customers').doc(uid).get(),
      db.collection('restaurants').where('uid', '==', uid).limit(1).get(),
      db.collection('riders').doc(uid).get()
    ]);

    if (!custSnap.exists && restSnap.empty && !riderSnap.exists) {
      // New Google user — create customer record
      await db.collection('customers').doc(uid).set({
        email: email,
        name: result.user.displayName || email.split('@')[0],
        photoURL: result.user.photoURL || '',
        authProvider: 'google',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      localStorage.setItem('wawa_user', JSON.stringify({
        id: uid, email: email,
        name: result.user.displayName || email.split('@')[0]
      }));
      window.location.href = 'customer-home.html';
      return;
    }

    // Existing user — route normally
    if (custSnap.exists) {
      localStorage.setItem('wawa_user', JSON.stringify({
        id: uid, email: email,
        name: custSnap.data().name || email.split('@')[0]
      }));
      window.location.href = 'customer-home.html';
    } else if (!restSnap.empty) {
      window.location.href = `restaurant-dashboard.html?id=${restSnap.docs[0].id}`;
    } else if (riderSnap.exists) {
      localStorage.setItem('wawa_rider', JSON.stringify({
        id: uid, email: email,
        name: riderSnap.data().name || email.split('@')[0]
      }));
      window.location.href = 'rider-dashboard.html';
    }
  } catch (err) {
    hideLoading();
    console.error('Google sign-in error:', err);
    showError(err.message || 'Google sign-in failed. Try again.');
  }
});

// Redirect if already logged in AND has valid localStorage role data
auth.onAuthStateChanged(user => {
  if (!user) return; // Not authenticated, stay on sign-in page

  // If trying to access sign-in while already logged in, check localStorage
  // Only redirect if user actually has role data in localStorage
  const wawaUser = localStorage.getItem('wawa_user');
  const wawaRestaurant = localStorage.getItem('wawa_restaurant');
  const wawaRider = localStorage.getItem('wawa_rider');
  const wawaAdmin = localStorage.getItem('wawa_admin');

  if (redirectUrl) return; // Explicit redirect param = respect it

  // Only redirect if we have role data — otherwise stay on sign-in
  // (user might have auth session but no actual role in the app)
  if (wawaUser || wawaRestaurant || wawaRider || wawaAdmin) {
    const uid = user.uid;
    Promise.all([
      db.collection('restaurants').where('uid', '==', uid).limit(1).get(),
      db.collection('customers').doc(uid).get(),
      db.collection('riders').doc(uid).get(),
      db.collection('admins').doc(uid).get()
    ]).then(([restSnap, custSnap, riderSnap, adminSnap]) => {
      if (!restSnap.empty) window.location.href = `restaurant-dashboard.html?id=${restSnap.docs[0].id}`;
      else if (custSnap.exists && wawaUser) window.location.href = 'customer-home.html';
      else if (riderSnap.exists && wawaRider) window.location.href = 'rider-dashboard.html';
      else if (adminSnap.exists && wawaAdmin) window.location.href = 'admin-dashboard.html';
      // else: auth session exists but no matching role data in localStorage
      // stay on sign-in page — don't redirect
    });
  }
});
</script>
